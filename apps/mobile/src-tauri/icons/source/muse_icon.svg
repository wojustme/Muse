<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B7CFF"/>
      <stop offset="1" stop-color="#6FB0FF"/>
    </linearGradient>
    <linearGradient id="glass" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.80"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#3A2F8F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- macOS 图标栅格：圆角方块居中，四周留白，squircle 圆角约占 22% -->
  <g filter="url(#shadow)">
    <rect x="112" y="96" width="800" height="800" rx="184" fill="url(#tile)"/>
    <rect x="112" y="96" width="800" height="400" rx="184" fill="url(#sheen)"/>
  </g>

  <!-- 由上升笔画构成、仍可读作 M 的字形 -->
  <path d="M300 660 L300 430 Q300 388 344 408 L512 500 L680 408 Q724 388 724 430 L724 660"
        fill="none" stroke="url(#glass)" stroke-width="78" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 右上创作火花 -->
  <path d="M712 250 L738 316 L804 342 L738 368 L712 434 L686 368 L620 342 L686 316 Z" fill="#F5C97B"/>
</svg>
